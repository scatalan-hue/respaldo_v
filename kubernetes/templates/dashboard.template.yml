apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${KUBE_DASHBOARD_USERNAME}
  namespace: kubernetes-dashboard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${KUBE_DASHBOARD_USERNAME}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: ${KUBE_DASHBOARD_USERNAME}
  namespace: kubernetes-dashboard
